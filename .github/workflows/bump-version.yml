name: Bump version in sidebar

on:
  push:
    tags:
      - 'v*'

jobs:
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Update version in Sidebar.jsx
        run: |
          sed -i "s/v[0-9]\+\.[0-9]\+\.[0-9]\+/${{ steps.version.outputs.VERSION }}/g" client/src/components/Sidebar.jsx

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add client/src/components/Sidebar.jsx
          git diff --cached --quiet || git commit -m "chore: bump sidebar version to ${{ steps.version.outputs.VERSION }}"
          git push origin master
